<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 賽事大數據紀錄板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .sticky-header { position: sticky; top: 0; z-index: 10; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800 antialiased font-sans">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <!-- 頂部 Header -->
        <div class="bg-gradient-to-r from-slate-900 via-indigo-950 to-slate-900 text-white p-6 md:p-8 rounded-2xl shadow-xl border-b-4 border-amber-500">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h1 class="text-2xl md:text-3xl font-extrabold tracking-wider flex items-center gap-2">
                        <span>🎮</span> CS 職業賽事紀錄大數據資料庫
                    </h1>
                    <p class="text-slate-400 text-sm mt-2 font-medium tracking-wide">2022 - 2026 S-Tier 頂級賽事結果與 HLTV 數據彙整</p>
                </div>
                <div class="bg-slate-800/60 backdrop-blur-sm border border-slate-700 px-4 py-2 rounded-xl text-right">
                    <span class="text-xs text-slate-400 block uppercase font-bold tracking-widest">符合篩選條件</span>
                    <span id="count" class="text-2xl font-black text-amber-400">0</span> <span class="text-sm text-slate-300">/ <span id="totalCount">0</span> 場</span>
                </div>
            </div>
        </div>

        <!-- 複合式搜尋與多功能過濾面板 -->
        <div class="mt-6 bg-white p-6 rounded-xl shadow-md border border-slate-200 space-y-4">
            <!-- 第一排：關鍵字搜尋 -->
            <div class="relative w-full">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-400">🔍</span>
                <input type="text" id="searchInput" 
                       placeholder="輸入關鍵字任意搜尋 (例如: 里斯本, Major, 上海)..." 
                       class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <!-- 第二排：各類條件高級尋找（下拉選單） -->
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4 items-end">
                <!-- 年份過濾 -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">📅 按年份尋找</label>
                    <select id="filterYear" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">全部年份</option>
                    </select>
                </div>

                <!-- 戰隊過濾（包含奪冠快篩） -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">🛡️ 按戰隊/榮譽尋找</label>
                    <select id="filterTeam" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">全部戰隊</option>
                        <!-- 由 JS 動態生成所有戰隊清單 -->
                    </select>
                </div>

                <!-- 賽事主辦方/級別過濾 -->
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">🏆 賽事類型/主辦</label>
                    <select id="filterType" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="">全部類型</option>
                        <option value="major">Major (特級錦標賽)</option>
                        <option value="blast">BLAST 系列賽</option>
                        <option value="iem">IEM / ESL 系列賽</option>
                    </select>
                </div>

                <!-- 重置按鈕 -->
                <div>
                    <button id="resetBtn" class="w-full py-2.5 bg-slate-200 hover:bg-slate-300 active:bg-slate-400 text-slate-700 font-bold text-sm rounded-lg transition-colors shadow-sm flex items-center justify-center gap-1">
                        🔄 清除所有條件
                    </button>
                </div>
            </div>
        </div>

        <!-- 數據表格區塊 -->
        <div class="mt-6 bg-white shadow-xl rounded-2xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="sticky-header bg-slate-800 text-slate-200 shadow-sm">
                        <tr class="text-xs uppercase tracking-wider font-bold">
                            <th class="p-4 w-20 text-center">年份</th>
                            <th class="p-4 min-w-[200px]">賽事名稱</th>
                            <th class="p-4 min-w-[200px]">HLTV 官方名稱</th>
                            <th class="p-4 min-w-[150px]">冠軍 (Winner)</th>
                            <th class="p-4 min-w-[150px]">亞軍 (Finalist)</th>
                            <th class="p-4 text-center w-24">最終比分</th>
                            <th class="p-4 text-center w-28">數據連結</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-200/80 text-sm font-medium">
                        <!-- 由 JavaScript 動態渲染 -->
                    </tbody>
                </table>
            </div>
            
            <!-- 無資料時顯示 -->
            <div id="noDataMessage" class="hidden py-12 text-center text-slate-400 font-medium">
                ❌ 找不到符合篩選條件的賽事資料
            </div>
        </div>
    </div>

    <script>
        let allData = [];

        async function init() {
            try {
                const response = await fetch('data.json');
                allData = await response.json();
                
                // 初始化基礎數據
                document.getElementById('totalCount').innerText = allData.length;
                
                // 動態建構下拉選單選項
                buildFilterOptions(allData);
                
                // 初次渲染全資料
                applyFilters();
            } catch (err) {
                console.error("無法加載 data.json", err);
                document.getElementById('tableBody').innerHTML = `
                    <tr>
                        <td colspan="7" class="p-8 text-center text-red-500 font-semibold">
                            ⚠️ 無法讀取 data.json 資料。請確保環境正確。
                        </td>
                    </tr>
                `;
            }
        }

        // 動態分析 JSON 資料，並自動把「年份」和「戰隊」塞進下拉選單，避免硬編碼
        function buildFilterOptions(data) {
            const yearSelect = document.getElementById('filterYear');
            const teamSelect = document.getElementById('filterTeam');
            
            const years = new Set();
            const teams = new Set();
            
            data.forEach(item => {
                if(item.year) years.add(item.year.toString());
                if(item.winner && item.winner !== '-') teams.add(item.winner);
                if(item.finalist && item.finalist !== '-') teams.add(item.finalist);
            });
            
            // 填入年份 (從新到舊排序)
            Array.from(years).sort((a,b) => b - a).forEach(year => {
                yearSelect.options.add(new Option(`${year} 年`, year));
            });
            
            // 填入戰隊選項 (建立一般參與和奪冠快篩)
            const sortedTeams = Array.from(teams).sort();
            
            // 先加一組「只看奪冠」的分組
            const optGroupWinner = document.createElement('optgroup');
            optGroupWinner.label = "🏆 只看該隊奪冠紀錄";
            sortedTeams.forEach(team => {
                const opt = new Option(`🥇 ${team} (冠軍)`, `winner:${team}`);
                optGroupWinner.appendChild(opt);
            });
            teamSelect.appendChild(optGroupWinner);

            // 再加一組「只要有進決賽」的分組
            const optGroupAll = document.createElement('optgroup');
            optGroupAll.label = "⚔️ 該隊有進決賽 (冠/亞軍)";
            sortedTeams.forEach(team => {
                const opt = new Option(`👥 ${team} (決賽隊伍)`, `any:${team}`);
                optGroupAll.appendChild(opt);
            });
            teamSelect.appendChild(optGroupAll);
        }

        // 核心：複合條件過濾器邏輯
        function applyFilters() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
            const selectedYear = document.getElementById('filterYear').value;
            const selectedTeamOpt = document.getElementById('filterTeam').value; // 格式可能為 "winner:Team" 或 "any:Team"
            const selectedType = document.getElementById('filterType').value;

            const filtered = allData.filter(item => {
                // 1. 關鍵字搜尋過濾
                if (searchTerm) {
                    const name = item.name ? String(item.name).toLowerCase() : '';
                    const hltvName = item.hltv_name ? String(item.hltv_name).toLowerCase() : '';
                    const winner = item.winner ? String(item.winner).toLowerCase() : '';
                    const finalist = item.finalist ? String(item.finalist).toLowerCase() : '';
                    const matchKeyword = name.includes(searchTerm) || hltvName.includes(searchTerm) || winner.includes(searchTerm) || finalist.includes(searchTerm);
                    if (!matchKeyword) return false;
                }

                // 2. 年份下拉過濾
                if (selectedYear && item.year && item.year.toString() !== selectedYear) {
                    return false;
                }

                // 3. 戰隊高級過濾
                if (selectedTeamOpt) {
                    const [mode, teamName] = selectedTeamOpt.split(':');
                    if (mode === 'winner' && item.winner !== teamName) {
                        return false;
                    }
                    if (mode === 'any' && item.winner !== teamName && item.finalist !== teamName) {
                        return false;
                    }
                }

                // 4. 賽事主辦方類型精準模糊過濾
                if (selectedType) {
                    const combinedName = ((item.name || '') + ' ' + (item.hltv_name || '')).toLowerCase();
                    if (selectedType === 'major' && !combinedName.includes('major')) return false;
                    if (selectedType === 'blast' && !combinedName.includes('blast')) return false;
                    if (selectedType === 'iem' && !combinedName.includes('iem') && !combinedName.includes('esl')) return false;
                }

                return true;
            });

            renderTable(filtered);
        }

        // 繪製/渲染表格
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const noDataMessage = document.getElementById('noDataMessage');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                noDataMessage.classList.remove('hidden');
                document.getElementById('count').innerText = 0;
                return;
            }
            
            noDataMessage.classList.add('hidden');
            
            tbody.innerHTML = data.map((item, index) => {
                const hasWinner = item.winner && item.winner !== '-';
                const winnerHTML = hasWinner 
                    ? `<span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-gradient-to-r from-amber-50 to-yellow-100 text-amber-800 border border-amber-300 shadow-sm">👑 ${item.winner}</span>`
                    : `<span class="text-slate-400 font-normal">-</span>`;

                const urlHTML = item.hltv_url 
                    ? `<a href="${item.hltv_url}" target="_blank" class="inline-flex items-center justify-center px-3 py-1.5 text-xs font-semibold text-indigo-600 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 rounded-md transition-colors gap-1 shadow-sm">HLTV 🔗</a>`
                    : `<span class="text-slate-400 font-normal text-xs">-</span>`;

                const rowBg = index % 2 === 0 ? 'bg-white' : 'bg-slate-50/60';

                return `
                    <tr class="${rowBg} hover:bg-indigo-50/30 transition-colors duration-150">
                        <td class="p-4 text-center text-slate-500 font-semibold">${item.year || '-'}</td>
                        <td class="p-4 font-bold text-slate-900">${item.name || '-'}</td>
                        <td class="p-4 text-slate-500 font-mono text-xs">${item.hltv_name || '-'}</td>
                        <td class="p-4">${winnerHTML}</td>
                        <td class="p-4 text-slate-700 font-semibold">${item.finalist || '-'}</td>
                        <td class="p-4 text-center">
                            <span class="inline-block px-2.5 py-1 text-xs font-bold font-mono bg-slate-800 text-slate-100 rounded border border-slate-700 shadow-inner">
                                ${item.score || '-'}
                            </span>
                        </td>
                        <td class="p-4 text-center">${urlHTML}</td>
                    </tr>
                `;
            }).join('');
            
            document.getElementById('count').innerText = data.length;
        }

        // 綁定監聽事件 (當任何輸入或選單改變時，即時觸發過濾)
        document.getElementById('searchInput').addEventListener('input', applyFilters);
        document.getElementById('filterYear').addEventListener('change', applyFilters);
        document.getElementById('filterTeam').addEventListener('change', applyFilters);
        document.getElementById('filterType').addEventListener('change', applyFilters);

        // 重置按鈕事件
        document.getElementById('resetBtn').addEventListener('click', () => {
            document.getElementById('searchInput').value = '';
            document.getElementById('filterYear').value = '';
            document.getElementById('filterTeam').value = '';
            document.getElementById('filterType').value = '';
            applyFilters();
        });

        // 初始化
        init();
    </script>
</body>
</html>
